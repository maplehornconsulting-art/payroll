name: Publish CRA Feed to Pages

on:
  workflow_dispatch:
  push:
    branches: [main]
    paths:
      - "cra_feed/output/**"

concurrency:
  group: cra-feed-pages
  cancel-in-progress: false

permissions:
  contents: read
  pages: write
  id-token: write

jobs:
  deploy:
    runs-on: ubuntu-latest
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}

    steps:
      - uses: actions/checkout@v4

      - name: Upload Pages artifact
        uses: actions/upload-pages-artifact@v3
        with:
          path: cra_feed/output

      - name: Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v4
